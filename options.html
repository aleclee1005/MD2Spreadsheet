<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      padding: 32px;
      color: #222;
    }
    h1 { font-size: 20px; margin-bottom: 24px; color: #000000; }
    .section {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
    }
    textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
      line-height: 1.5;
    }
    .hint { font-size: 11px; color: #888; margin-top: 4px; }
    .hint a { color: #000000; }
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
    }
    #save-btn {
      margin-top: 8px;
      padding: 10px 24px;
      background: #000000;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #save-btn:hover { background: #222222; }
    #msg { margin-top: 10px; font-size: 13px; color: #000000; min-height: 18px; }
    .sheet-row {
      display: flex; align-items: center; gap: 8px; margin-top: 6px;
    }
    .sheet-row a { font-size: 12px; color: #000000; }
    #disconnect-btn {
      font-size: 11px; color: #c0392b;
      background: none; border: none; cursor: pointer; text-decoration: underline;
    }
    .col-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }
    .col-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 400;
      font-size: 13px;
      margin-bottom: 0;
      cursor: pointer;
    }
    .col-item input { margin: 0; cursor: pointer; }
  </style>
</head>
<body>
  <h1>AI Clip Sheet Settings</h1>

  <div class="section">
    <label>Columns to Save</label>
    <div class="col-grid">
      <label class="col-item"><input type="checkbox" id="col-date" value="date"> Date</label>
      <label class="col-item"><input type="checkbox" id="col-url" value="url"> URL</label>
      <label class="col-item"><input type="checkbox" id="col-title" value="title"> Title</label>
      <label class="col-item"><input type="checkbox" id="col-author" value="author"> Author</label>
      <label class="col-item"><input type="checkbox" id="col-published" value="published"> Published</label>
      <label class="col-item"><input type="checkbox" id="col-summary" value="summary"> Summary</label>
    </div>
    <p class="hint" style="margin-top:8px;">Note: changes apply to new rows only. If you add/remove columns, reset the spreadsheet by clicking Disconnect first.</p>
  </div>

  <div class="section">
    <label>AI Summary Method</label>
    <select id="summary-mode">
      <option value="gemini_api">Gemini API (recommended — works for everyone)</option>
      <option value="ai_formula">=AI() formula (requires Google One AI Premium)</option>
    </select>
  </div>

  <div class="section">
    <label>Summary Prompt</label>
    <textarea id="summary-prompt" placeholder="Summarize this article in 3 concise bullet points (in the same language as the article). Do not include any intro sentence, just the bullet points:"></textarea>
    <p class="hint">Customize how AI summarizes the page. Leave blank to use the default prompt.</p>
  </div>

  <div class="section">
    <label>Gemini API Key</label>
    <input type="password" id="gemini-key" placeholder="AIza…">
    <p class="hint">Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a></p>
  </div>

  <div class="section">
    <label>Gemini Model</label>
    <select id="gemini-model">
      <option value="gemini-2.5-flash">gemini-2.5-flash (recommended)</option>
      <option value="gemini-2.0-flash">gemini-2.0-flash</option>
      <option value="gemini-1.5-flash">gemini-1.5-flash</option>
      <option value="gemini-1.5-pro">gemini-1.5-pro</option>
    </select>
  </div>

  <div class="section">
    <label>Google Account</label>
    <div class="sheet-row">
      <span id="sheet-status" style="font-size:13px;color:#555;">Not connected</span>
      <a id="sheet-open" href="#" target="_blank" style="display:none">Open Spreadsheet ↗</a>
    </div>
    <div style="margin-top:8px; display:flex; gap:8px; align-items:center;">
      <button id="connect-btn" style="padding:6px 14px;background:#000000;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">Connect Google Account</button>
      <button id="disconnect-btn">Disconnect</button>
    </div>
  </div>

  <button id="save-btn">Save Settings</button>
  <div id="msg"></div>

  <script src="options.js"></script>
</body>
</html>
