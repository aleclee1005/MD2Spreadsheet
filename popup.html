<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      color: #111;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 16px 3px;
    }
    .header span { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
    .header a {
      font-size: 29px;
      line-height: 1;
      text-decoration: none;
      cursor: pointer;
      color: #111;
      opacity: 0.75;
    }
    .header a:hover { opacity: 1; }
    .divider { height: 1px; background: #e5e5e5; margin: 0 16px; }
    .preview {
      padding: 8px 16px;
      display: none;
    }
    .preview-row {
      display: flex;
      gap: 8px;
      padding: 3px 0;
      font-size: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .preview-row:last-child { border-bottom: none; }
    .preview-label {
      color: #888;
      font-weight: 600;
      width: 64px;
      flex-shrink: 0;
      text-transform: capitalize;
    }
    .preview-value {
      color: #111;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .preview-value.ai { color: #aaa; font-style: italic; }
    .body {
      padding: 12px 16px 2px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .btn-row {
      display: flex;
      gap: 8px;
    }
    #save-btn {
      flex: 1;
      padding: 6px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    #save-btn:hover { background: #333; }
    #save-btn:disabled { background: #aaa; cursor: not-allowed; }
    #status {
      font-size: 12px;
      text-align: center;
      color: #555;
      min-height: 8px;
    }
    #status.success { color: #111; font-weight: 600; }
    #status.error { color: #c0392b; }
    #disclaimer { font-size: 10px; color: #bbb; text-align: center; margin-top: 4px; line-height: 1.4; }
    .sheet-link { display: none; flex: 1; }
    .sheet-link a {
      font-size: 13px;
      font-weight: 700;
      color: #111;
      text-decoration: none;
      border: 2px solid #111;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      text-align: center;
      height: 100%;
      white-space: nowrap;
    }
    .sheet-link a:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <div class="header">
    <span>AI Clip Sheet</span>
    <a id="options-link" title="Settings">⚙</a>
  </div>
  <div class="divider"></div>
  <div class="preview" id="preview"></div>
  <div class="divider" id="preview-divider" style="display:none"></div>
  <div class="body">
    <div class="btn-row">
      <button id="save-btn">Save to Sheets</button>
      <div class="sheet-link" id="sheet-link">
        <a id="sheet-url" href="#" target="_blank">Open Spreadsheet ↗</a>
      </div>
    </div>
    <div id="status"></div>
    <div id="disclaimer">Use at your own risk. Do not use on pages containing sensitive personal or financial information.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
